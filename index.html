<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>The World of Queen l'app</title>
  <meta name="description" content="L'application officielle de The World of Queen — L'Éternelle Légende.">

  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TWOQ">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0A0A0A;
      --card: #141414;
      --card-2: #1A1A1A;
      --border: #2A2A2A;
      --border-strong: #3A3A3A;
      --gold: #D4AF37;
      --gold-pale: #F0D77A;
      --gold-deep: #A8862A;
      --crimson: #8B0000;
      --crimson-deep: #5C0000;
      --cream: #F5F1E8;
      --smoke: #8B8580;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
      --tab-h: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--cream); font-family: var(--sans); height: 100%; overflow: hidden; }
    body { font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    a { color: var(--gold); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: calc(var(--safe-top) + 16px) 16px calc(var(--tab-h) + var(--safe-bottom) + 24px);
      -webkit-overflow-scrolling: touch;
    }
    .screen::-webkit-scrollbar { display: none; }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 500;
      color: var(--cream);
      margin: 0 0 16px;
      line-height: 1.1;
    }
    .h2 {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      color: var(--cream);
      margin: 0 0 10px;
    }
    .mut { color: var(--smoke); font-size: 12px; }

    .tabbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--smoke);
      font-size: 9px;
      letter-spacing: 0.5px;
      font-weight: 500;
      padding: 8px 2px;
      transition: color 0.2s;
    }
    .tab.active { color: var(--gold); }
    .tab svg { width: 22px; height: 22px; stroke-width: 1.5; }
    .tab.active svg { stroke-width: 2; }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: #0A0A0A;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-gold:active { transform: scale(0.97); background: var(--gold-pale); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      transition: background 0.15s;
    }
    .btn-outline:active { background: rgba(212,175,55,0.1); }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .tag-gold { background: var(--gold); color: #3D2F08; }
    .tag-crimson { background: var(--crimson); color: var(--cream); }
    .tag-outline { border: 0.5px solid var(--gold); color: var(--gold); }

    .hero {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      padding: 18px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #2a1a1a 0%, #0A0A0A 50%, #1a1a2a 100%);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(212,175,55,0.25) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 2; }
    .hero-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .hero-venue { font-family: var(--serif); font-size: 20px; color: var(--cream); }
    .hero-date { color: var(--smoke); margin-top: 4px; font-size: 12px; }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .section-eyebrow {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.8px;
      font-weight: 600;
      text-transform: uppercase;
      margin: 22px 0 6px;
    }
    .section-title {
      font-family: var(--serif);
      color: var(--cream);
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .date-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 8px;
      border-left: 3px solid var(--gold);
      align-items: center;
      transition: transform 0.15s, background 0.15s;
    }
    .date-card:active { transform: scale(0.98); background: var(--card-2); }
    .date-card .dt {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      min-width: 50px;
    }
    .date-card .day {
      font-family: var(--serif);
      color: var(--gold);
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
    }
    .date-card .mo {
      color: var(--smoke);
      font-size: 9px;
      letter-spacing: 1.2px;
      margin-top: 3px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .date-card .info { flex: 1; min-width: 0; }
    .date-card .city { color: var(--cream); font-size: 14px; font-weight: 500; }
    .date-card .venue { color: var(--smoke); font-size: 11px; margin-top: 2px; }
    .date-card .arrow { color: var(--gold); }
    .date-card.featured { border-left-color: var(--crimson); }

    .video-thumb {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-thumb::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(212,175,55,0.2) 0%, transparent 50%);
    }
    .play-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .play-btn svg { width: 22px; height: 22px; color: #0A0A0A; margin-left: 3px; }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .gallery-item {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a1a1a 100%);
      border-radius: 8px;
    }
    .gallery-item:nth-child(2) { background: linear-gradient(135deg, #1a1a2a 0%, #1a1a1a 100%); }
    .gallery-item:nth-child(4) { background: linear-gradient(135deg, #2a1a1a 0%, #1a1a1a 100%); }
    .gallery-item:nth-child(5) { background: linear-gradient(135deg, #1a1a1a 0%, #0a1a2a 100%); }
    .gallery-item:nth-child(6) { background: linear-gradient(135deg, #2a2a1a 0%, #1a1a1a 100%); }
    .gallery-item:nth-child(8) { background: linear-gradient(135deg, #1a1a2a 0%, #2a1a2a 100%); }
    .gallery-item:nth-child(9) { background: linear-gradient(135deg, #2a1a1a 0%, #1a2a1a 100%); }

    .contest-card {
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .contest-progress {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }
    .contest-progress > div {
      height: 100%;
      background: var(--gold);
      transition: width 0.4s ease-out;
    }

    .poll-option {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--cream);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .poll-option.selected { border-color: var(--gold); background: rgba(212,175,55,0.08); }
    .poll-option .pct { margin-left: auto; color: var(--gold); font-weight: 500; }

    .avatar-circle {
      width: 92px; height: 92px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--gold);
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 36px;
      font-family: var(--serif);
      font-weight: 500;
    }

    .stat-row { display: flex; gap: 8px; margin: 14px 0; }
    .stat-box {
      flex: 1;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num { color: var(--gold); font-size: 22px; font-weight: 500; font-family: var(--serif); }
    .stat-lab { color: var(--smoke); font-size: 9px; letter-spacing: 1.2px; margin-top: 2px; }

    .menu-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 0.5px solid #1F1F1F;
      gap: 14px;
    }
    .menu-row svg { color: var(--gold); width: 20px; height: 20px; flex-shrink: 0; }
    .menu-row .lbl { flex: 1; color: var(--cream); font-size: 14px; }
    .menu-row .arr { color: var(--smoke); }

    .product-tile {
      aspect-ratio: 0.9;
      background: var(--card);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
    }
    .product-img {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a1a1a 100%);
      border-radius: 8px;
      flex: 1;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }
    .product-img svg { width: 32px; height: 32px; }
    .product-name { color: var(--cream); font-size: 12px; font-weight: 500; line-height: 1.3; }
    .product-price { color: var(--gold); font-size: 12px; margin-top: 4px; font-weight: 500; }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fred-cover {
      height: 160px;
      border-radius: 16px;
      background: linear-gradient(180deg, #1a1a1a 0%, #2a1a1a 50%, #0A0A0A 100%);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .fred-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.25) 0%, transparent 60%);
    }
    .fred-cover .legend {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      z-index: 2;
    }
    .fred-cover .legend .name { font-family: var(--serif); font-size: 24px; color: var(--cream); }
    .fred-cover .legend .role { font-size: 10px; color: var(--gold); letter-spacing: 1.8px; margin-top: 4px; text-transform: uppercase; }

    .artist-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: var(--card);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      margin-bottom: 8px;
    }
    .artist-card .av {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
    }
    .artist-card .info { flex: 1; }
    .artist-card .nm { color: var(--cream); font-size: 13px; font-weight: 500; }
    .artist-card .rl { color: var(--smoke); font-size: 11px; margin-top: 2px; }

    /* ================================================
       SPLASH CINÉMATOGRAPHIQUE TWOQ
       Ciel étoilé + nébuleuse + étoile Freddie + logo
       ================================================ */
    .splash {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* Nébuleuse de fond — radial gradient or/bleu */
    .nebula {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(212,175,55,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 70% at 50% 50%, rgba(91,163,245,0.08) 0%, transparent 70%),
        radial-gradient(circle at 75% 25%, rgba(212,175,55,0.10) 0%, transparent 40%),
        #000000;
    }

    /* Petites étoiles scintillantes */
    .star {
      position: absolute;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 4px rgba(255,255,255,0.6);
      animation: twinkle 3s ease-in-out infinite;
      opacity: 0;
    }
    .star.gold { background: var(--gold-pale); box-shadow: 0 0 6px var(--gold); }
    .star.blue { background: #5BA3F5; box-shadow: 0 0 5px rgba(91,163,245,0.8); }

    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Étoile filante (hyperdrive) — part du centre et grossit vers l'utilisateur */
    .hyper-star {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 2px;
      background: var(--gold-pale);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-pale);
      transform-origin: center;
      will-change: transform, opacity;
      opacity: 0;
    }
    /* Chaque étoile a son angle (--angle) et son délai (--delay) injectés en inline-style */
    @keyframes hyperWarp {
      0% {
        opacity: 0;
        transform: rotate(var(--angle, 0deg)) translateX(0) scale(0.5);
        box-shadow: 0 0 2px var(--gold-pale);
      }
      15% {
        opacity: 1;
        box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-pale);
      }
      85% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle, 0deg)) translateX(80vmax) scale(2.5);
        box-shadow: 0 0 14px var(--gold), 0 0 30px var(--gold-pale);
      }
    }
    /* Traînée derrière l'étoile (effet warp) */
    .hyper-star::after {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      height: 1px;
      width: 60px;
      transform: translateY(-50%);
      background: linear-gradient(to left, var(--gold-pale), transparent);
      opacity: 0.85;
      pointer-events: none;
    }

    /* L'ÉTOILE FREDDIE — étoile à 4 rayons en haut à droite */
    .freddie-star {
      position: absolute;
      top: 15%;
      right: 15%;
      width: 110px;
      height: 110px;
      animation: freddieFade 2.5s ease-out 0.4s both;
    }
    @keyframes freddieFade {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    .freddie-halo {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, rgba(212,175,55,0.15) 40%, transparent 70%);
      animation: haloPulse 3s ease-in-out infinite;
    }
    @keyframes haloPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .freddie-rays {
      position: absolute;
      inset: 0;
      animation: raysRotate 18s linear infinite;
    }
    .freddie-rays svg { width: 100%; height: 100%; }
    @keyframes raysRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .freddie-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      margin: -4px 0 0 -4px;
      border-radius: 50%;
      background: var(--cream);
      box-shadow: 0 0 12px var(--gold-pale), 0 0 24px var(--gold);
      animation: corePulse 2s ease-in-out infinite;
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.5); }
    }

    /* Logo TWOQ centré */
    .splash-logo {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -55%) scale(0.85);
      width: 90%;
      max-width: 460px;
      opacity: 0;
      animation: logoEnter 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
      z-index: 10;
      filter: drop-shadow(0 0 30px rgba(212,175,55,0.4));
    }
    @keyframes logoEnter {
      0% { opacity: 0; transform: translate(-50%, -55%) scale(0.85); }
      100% { opacity: 1; transform: translate(-50%, -55%) scale(1); }
    }

    /* Bouton ENTRER */
    .splash-button-wrap {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      animation: buttonEnter 1s ease-out 2.4s forwards;
      z-index: 20;
    }
    @keyframes buttonEnter {
      0% { opacity: 0; transform: translate(-50%, 20px) scale(0.85); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }
    .splash-button {
      background: var(--gold);
      color: #0A0A0A;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 6px;
      padding: 16px 56px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(212,175,55,0.6);
      transition: transform 0.15s, background 0.15s;
      animation: buttonPulse 2.4s ease-in-out 3.5s infinite;
    }
    .splash-button:active {
      background: var(--gold-pale);
      transform: scale(0.97);
    }
    @keyframes buttonPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(212,175,55,0.6); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(212,175,55,0.9); }
    }
    .splash-hint {
      margin-top: 16px;
      font-style: italic;
      letter-spacing: 1.5px;
      color: var(--cream);
      opacity: 0.5;
      font-size: 11px;
    }

    /* Message de bienvenue doré clignotant */
    @keyframes welcomeShine {
      0%, 100% {
        color: #8B6914;
        text-shadow: 0 0 4px rgba(212, 175, 55, 0.2);
        opacity: 0.6;
      }
      50% {
        color: #F0D77A;
        text-shadow: 0 0 14px rgba(240, 215, 122, 0.9), 0 0 24px rgba(212, 175, 55, 0.6);
        opacity: 1;
      }
    }
    .welcome-shine {
      animation: welcomeShine 1.6s ease-in-out infinite;
    }

    /* Tag "Prochaine date" qui clignote pour attirer l'œil */
    @keyframes tagBlink {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 rgba(139,0,0,0);
        transform: scale(1);
      }
      50% {
        opacity: 0.85;

  function generateStars() {
    const container = document.getElementById('stars');
    if (!container) return;
    const count = 60;
    let html = '';
    for (let i = 0; i < count; i++) {
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 2 + 0.8;
      const delay = Math.random() * 3;
      const duration = 2 + Math.random() * 2.5;
      // 70% blanc, 20% or, 10% bleu
      const r = Math.random();
      const type = r < 0.7 ? '' : (r < 0.9 ? ' gold' : ' blue');
      html += `<div class="star${type}" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;animation-delay:${delay}s;animation-duration:${duration}s;"></div>`;
    }
    container.innerHTML = html;
  }
  generateStars();

  // ================================================
  // HYPERDRIVE : 60 étoiles dorées qui foncent du centre vers toi
  // ================================================
  function generateHyperdrive() {
    const container = document.getElementById('hyperdrive');
    if (!container) return;
    const count = 60;
    let html = '';
    for (let i = 0; i < count; i++) {
      // Angle aléatoire 0-360°
      const angle = Math.random() * 360;
      // Délai aléatoire pour que les étoiles ne partent pas toutes en même temps
      const delay = Math.random() * 7;
      // Durée variable pour donner de la profondeur (étoiles loin = lentes, près = rapides)
      const duration = 5 + Math.random() * 4;
      html += `<div class="hyper-star" style="--angle:${angle}deg; animation: hyperWarp ${duration}s linear ${delay}s infinite;"></div>`;
    }
    container.innerHTML = html;
  }

  function selectPoll(e, idx) {
    document.querySelectorAll('.poll-option').forEach(o => o.classList.remove('selected'));
    e.currentTarget.classList.add('selected');
  }

  function hardRefresh(ev) {
    try {
      // Trouve le bouton (au cas où l'event vient du <svg> enfant)
      var btn = null;
      if (ev && ev.target) {
        btn = ev.target.closest ? ev.target.closest('button') : null;
      }
      if (btn) {
        btn.style.transform = 'rotate(360deg)';
        btn.style.transition = 'transform 0.6s ease';
        setTimeout(function() {
          btn.style.transition = '';
          btn.style.transform = '';
        }, 700);
      }
      // Toast visuel de confirmation
      showToast('✓ Actualisé');
      // Re-render de l'écran courant
      var activeTab = document.querySelector('.tab.active');
      var name = activeTab ? activeTab.dataset.tab : 'dates';
      if (typeof show === 'function') show(name);
    } catch (e) {
      console.error('hardRefresh error:', e);
      alert('Erreur refresh : ' + e.message);
    }
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(212,175,55,0.95);color:#0A0A0A;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:opacity 0.3s;';
    document.body.appendChild(t);
    setTimeout(function() {
      t.style.opacity = '0';
      setTimeout(function() { t.remove(); }, 300);
    }, 1500);
  }

  function openAuth() {
    // Placeholder — sera remplacé par la vraie popup inscription/connexion Supabase
    alert('Connexion / Inscription — bientôt disponible');
  }

  function show(name) {
    const screen = document.getElementById('screen');
    screen.innerHTML = screens[name]();
    screen.scrollTop = 0;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => show(t.dataset.tab));
  });
