<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>The World of Queen l'app</title>
  <meta name="description" content="L'application officielle de The World of Queen — L'Éternelle Légende.">

  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TWOQ">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0A0A0A;
      --card: #141414;
      --card-2: #1A1A1A;
      --border: #2A2A2A;
      --border-strong: #3A3A3A;
      --gold: #D4AF37;
      --gold-pale: #F0D77A;
      --gold-deep: #A8862A;
      --crimson: #8B0000;
      --crimson-deep: #5C0000;
      --cream: #F5F1E8;
      --smoke: #8B8580;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
      --tab-h: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--cream); font-family: var(--sans); height: 100%; overflow: hidden; }
    body { font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    a { color: var(--gold); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: calc(var(--safe-top) + 16px) 16px calc(var(--tab-h) + var(--safe-bottom) + 24px);
      -webkit-overflow-scrolling: touch;
    }
    .screen::-webkit-scrollbar { display: none; }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 500;
      color: var(--cream);
      margin: 0 0 16px;
      line-height: 1.1;
    }
    .h2 {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      color: var(--cream);
      margin: 0 0 10px;
    }
    .mut { color: var(--smoke); font-size: 12px; }

    .tabbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--smoke);
      font-size: 9px;
      letter-spacing: 0.5px;
      font-weight: 500;
      padding: 8px 2px;
      transition: color 0.2s;
    }
    .tab.active { color: var(--gold); }
    .tab svg { width: 22px; height: 22px; stroke-width: 1.5; }
    .tab.active svg { stroke-width: 2; }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: #0A0A0A;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-gold:active { transform: scale(0.97); background: var(--gold-pale); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      transition: background 0.15s;
    }
    .btn-outline:active { background: rgba(212,175,55,0.1); }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .tag-gold { background: var(--gold); color: #3D2F08; }
    .tag-crimson { background: var(--crimson); color: var(--cream); }
    .tag-outline { border: 0.5px solid var(--gold); color: var(--gold); }

    .hero {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      padding: 18px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      margin-bottom: 16px;
      background-color: #1a1a1a;
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 2; }
    .hero-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .hero-venue { font-family: var(--serif); font-size: 22px; color: #FFFFFF; font-weight: 600; }
    .hero-date { color: #F5F1E8; margin-top: 4px; font-size: 13px; }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .section-eyebrow {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.8px;
      font-weight: 600;
      text-transform: uppercase;
      margin: 22px 0 6px;
    }
    .section-title {
      font-family: var(--serif);
      color: var(--cream);
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .date-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 8px;
      border-left: 3px solid var(--gold);
      align-items: center;
      transition: transform 0.15s, background 0.15s;
    }
    .date-card:active { transform: scale(0.98); background: var(--card-2); }
    .date-card .dt {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      min-width: 50px;
    }
    .date-card .day {
      font-family: var(--serif);
      color: var(--gold);
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
    }
    .date-card .mo {
      color: var(--smoke);
      font-size: 9px;
      letter-spacing: 1.2px;
      margin-top: 3px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .date-card .info { flex: 1; min-width: 0; }
    .date-card .city { color: var(--cream); font-size: 14px; font-weight: 500; }
    .date-card .venue { color: var(--smoke); font-size: 11px; margin-top: 2px; }
    .date-card .arrow { color: var(--gold); }
    .date-card.featured { border-left-color: var(--crimson); }

    .video-thumb {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-thumb::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(212,175,55,0.2) 0%, transparent 50%);
    }
    .play-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .play-btn svg { width: 22px; height: 22px; color: #0A0A0A; margin-left: 3px; }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 14px;
    }
    .gallery-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      cursor: pointer;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gallery-item:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.25);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .gallery-item img.loaded {
      opacity: 1;
    }

    /* === LIGHTBOX GALERIE === */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      touch-action: pan-y;
    }
    .lightbox.active {
      display: flex;
      animation: lightboxFadeIn 0.3s ease-out;
    }
    @keyframes lightboxFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .lightbox-img-wrap {
      position: relative;
      max-width: 96%;
      max-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 32px rgba(212, 175, 55, 0.2);
      animation: lightboxImgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes lightboxImgIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.95);
      color: #0A0A0A;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      z-index: 10000;
    }
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10000;
      transition: background 0.2s;
    }
    .lightbox-nav:hover {
      background: rgba(212, 175, 55, 0.2);
    }
    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }
    .lightbox-controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 999px;
      padding: 8px 18px;
      z-index: 10000;
      backdrop-filter: blur(8px);
    }
    .lightbox-counter {
      color: var(--cream);
      font-size: 13px;
      letter-spacing: 1px;
      font-family: var(--serif);
      min-width: 60px;
      text-align: center;
    }
    .lightbox-playpause {
      background: transparent;
      border: none;
      color: var(--gold);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .lightbox-playpause:hover {
      background: rgba(212, 175, 55, 0.15);
    }

    /* Hint swipe pour la lightbox photos */
    .lightbox-swipe-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 16px;
      padding: 16px 24px;
      z-index: 9998;
      pointer-events: none;
      backdrop-filter: blur(10px);
      animation: swipeHintIn 0.4s ease-out, swipeHintFade 4s ease-in-out forwards;
    }
    .lightbox-swipe-hint.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .contest-card {
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .contest-progress {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }
    .contest-progress > div {
      height: 100%;
      background: var(--gold);
      transition: width 0.4s ease-out;
    }

    .poll-option {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--cream);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .poll-option.selected { border-color: var(--gold); background: rgba(212,175,55,0.08); }
    .poll-option .pct { margin-left: auto; color: var(--gold); font-weight: 500; }

    .avatar-circle {
      width: 92px; height: 92px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--gold);
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 36px;
      font-family: var(--serif);
      font-weight: 500;
    }

    /* === PAGE SHOW : ajouts === */
    .show-logo-wrap {
      text-align: center;
      margin: -50px -16px -2px;
      padding: 0 16px 4px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.35);
    }
    .show-logo-wrap + .h1 {
      margin-top: 14px;
    }
    .show-logo {
      max-width: 100%;
      max-height: 200px;
      height: auto;
      width: auto;
      display: inline-block;
      filter: drop-shadow(0 0 24px rgba(212, 175, 55, 0.45));
    }
    .stat-stars {
      color: var(--gold);
      font-size: 16px;
      letter-spacing: 1px;
      line-height: 1.1;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
    }
    .video-player-wrap {
      position: relative;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(212, 175, 55, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 24px rgba(212, 175, 55, 0.1);
      margin: 12px 0 0;
    }
    .video-player {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }
    .unmute-btn {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 175, 55, 0.95);
      color: #0A0A0A;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.4);
      animation: pulseGold 2s ease-in-out infinite;
      z-index: 10;
    }
    .unmute-btn:hover { background: var(--gold); }
    @keyframes pulseGold {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* === BANDEAU CRITIQUES SPECTATEURS — défilement auto === */
    .reviews-marquee {
      margin: 14px -16px 0;
      padding: 8px 0;
      overflow: hidden;
      mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);
    }
    .reviews-track {
      display: flex;
      gap: 12px;
      animation: reviewsScroll 90s linear infinite;
      width: max-content;
    }
    .reviews-track.paused {
      animation-play-state: paused;
    }
    @keyframes reviewsScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .review-bubble {
      flex: 0 0 auto;
      width: 260px;
      background: linear-gradient(180deg, rgba(28, 22, 14, 0.7), rgba(15, 12, 8, 0.5));
      border: 1px solid rgba(212, 175, 55, 0.28);
      border-radius: 12px;
      padding: 12px 14px;
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .review-bubble:active {
      border-color: rgba(212, 175, 55, 0.6);
    }
    .review-stars {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.35);
    }
    .review-text {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 12.5px;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .review-author {
      color: var(--smoke);
      font-size: 10.5px;
      letter-spacing: 0.5px;
      text-align: right;
    }

    /* === BLOC PITCH SPECTACLE === */
    .pitch-card {
      background: linear-gradient(180deg, rgba(28, 22, 14, 0.6), rgba(15, 12, 8, 0.4));
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 16px;
      padding: 20px 16px;
      margin-top: 14px;
      box-shadow: 0 0 32px rgba(212, 175, 55, 0.08), inset 0 1px 0 rgba(212, 175, 55, 0.1);
      position: relative;
      overflow: hidden;
    }
    .pitch-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.18), transparent 70%);
      pointer-events: none;
    }
    .pitch-intro {
      color: var(--smoke);
      font-size: 10.5px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .pitch-show-name {
      display: block;
      color: var(--gold);
      font-family: var(--serif);
      font-size: 12.5px;
      letter-spacing: 0.8px;
      margin-top: 5px;
      text-transform: none;
      font-style: italic;
    }
    .pitch-quote {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      line-height: 1.55;
      padding: 10px 0 10px 12px;
      border-left: 2px solid var(--gold);
      margin: 0 0 14px;
      position: relative;
      z-index: 1;
    }
    .pitch-quote strong {
      color: var(--gold);
      font-style: normal;
      font-weight: 600;
    }
    .pitch-body {
      color: var(--cream);
      font-size: 12px;
      line-height: 1.65;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .pitch-body strong {
      color: #F0D77A;
      font-weight: 600;
    }
    .pitch-body em {
      color: #F0D77A;
      font-style: italic;
    }

    /* === SETLIST style affiche spectacle === */
    .pitch-setlist {
      margin: 16px 0 14px;
      padding: 12px 0;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .pitch-setlist-label {
      color: var(--gold);
      font-size: 9px;
      letter-spacing: 2.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .pitch-setlist-text {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 12px;
      font-style: italic;
      line-height: 1.7;
      letter-spacing: 0.2px;
    }
    .pitch-setlist-text .dot {
      color: var(--gold);
      font-weight: 700;
      margin: 0 4px;
      font-style: normal;
    }
    .pitch-setlist-more {
      color: var(--smoke);
      font-size: 10.5px;
      font-style: italic;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }

    /* === PUNCHLINE 5 LIGNES === */
    .pitch-tagline {
      text-align: center;
      padding: 16px 0 6px;
      position: relative;
      z-index: 1;
    }
    .pt-line-1 {
      color: var(--gold);
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 2.5px;
      margin-bottom: 8px;
      text-shadow: 0 0 14px rgba(212, 175, 55, 0.3);
    }
    .pt-line-2 {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 12px;
      font-style: italic;
      letter-spacing: 0.3px;
      margin-bottom: 10px;
    }
    .pt-line-3 {
      color: var(--gold);
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 3.5px;
      margin-bottom: 12px;
      text-shadow: 0 0 18px rgba(212, 175, 55, 0.45);
    }
    .pt-line-4 {
      color: #F0D77A;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .pt-line-5 {
      color: var(--smoke);
      font-family: var(--serif);
      font-size: 11px;
      font-style: italic;
      letter-spacing: 1px;
    }

    .pitch-credit {
      text-align: center;
      color: var(--smoke);
      font-size: 9.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }
    .pitch-credit strong {
      color: var(--gold);
      letter-spacing: 2px;
    }
    /* === SIGNATURE OH MY PROD couleurs officielles === */
    .omp-logo {
      font-family: var(--sans);
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      text-transform: none;
    }
    .omp-logo .omp-r {
      color: #E11D2A; /* rouge OMP */
    }
    .omp-big {
      font-size: 1.15em;
      letter-spacing: 1px;
    }

    /* === PAGE ARTISTES : HERO FRED === */
    .hero-artist {
      position: relative;
      width: 100%;
      height: 380px;
      border-radius: 16px;
      overflow: hidden;
      margin: 14px 0 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 28px rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .hero-artist-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 20%;
      background-color: #0A0A0A;
    }
    .hero-artist-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0) 0%, rgba(10, 10, 10, 0) 45%, rgba(10, 10, 10, 0.85) 85%, rgba(10, 10, 10, 0.95) 100%);
    }
    .hero-artist-content {
      position: absolute;
      bottom: 18px;
      left: 18px;
      right: 18px;
      z-index: 2;
    }
    .hero-artist-tag {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 600;
      margin-bottom: 6px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    .hero-artist-name {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.5px;
      line-height: 1.1;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }
    .hero-artist-sub {
      color: #F0D77A;
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      line-height: 1.4;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    /* === BIO ARTISTE === */
    .artist-bio {
      padding: 4px 2px 8px;
    }
    .artist-bio p {
      color: var(--cream);
      font-size: 13px;
      line-height: 1.7;
      margin: 0 0 10px;
    }
    .artist-bio p:last-child { margin-bottom: 0; }
    .artist-bio strong {
      color: #F0D77A;
      font-weight: 600;
    }
    .artist-bio em {
      color: var(--gold);
      font-style: italic;
    }

    /* === GRILLE MUSICIENS === */
    .band-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    .band-card {
      background: linear-gradient(180deg, rgba(28, 22, 14, 0.5), rgba(15, 12, 8, 0.3));
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }
    .band-card:hover {
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateY(-2px);
    }
    .band-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a1f0e, #0f0a04);
      border: 1.5px solid rgba(212, 175, 55, 0.4);
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 0 16px rgba(212, 175, 55, 0.1);
    }
    .band-init {
      font-family: var(--serif);
      color: var(--gold);
      font-size: 28px;
      font-weight: 500;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }
    .band-name {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .band-role {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* === VIGNETTES LARGES (groupe) === */
    .wide-card {
      position: relative;
      width: 100%;
      height: 240px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 18px rgba(212, 175, 55, 0.1);
      transition: border-color 0.2s, transform 0.2s;
    }
    .wide-card:last-of-type {
      margin-bottom: 0;
    }
    .wide-card:hover {
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateY(-2px);
    }
    .wide-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #0A0A0A;
    }
    .wide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0) 40%, rgba(10,10,10,0.9) 92%, rgba(10,10,10,1) 100%);
    }
    .wide-content {
      position: absolute;
      bottom: 14px;
      left: 18px;
      right: 18px;
      z-index: 2;
    }
    .wide-tag {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 600;
      margin-bottom: 5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }
    .wide-name {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    .wide-sub {
      color: #F0D77A;
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }

    /* === DREAM TEAM CARD === */
    .dream-team-card {
      position: relative;
      width: 100%;
      height: 240px;
      border-radius: 16px;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid rgba(212, 175, 55, 0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 24px rgba(212, 175, 55, 0.15);
    }
    .dream-team-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #0A0A0A;
    }
    .dream-team-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0) 40%, rgba(10,10,10,0.9) 92%, rgba(10,10,10,1) 100%);
    }
    .dream-team-content {
      position: absolute;
      bottom: 14px;
      left: 18px;
      right: 18px;
      z-index: 2;
    }
    .dream-team-tag {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 600;
      margin-bottom: 5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }
    .dream-team-title {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    .dream-team-sub {
      color: #F0D77A;
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* === CARTE CASCADEURS (scène large) === */
    .cascadeurs-card {
      position: relative;
      width: 100%;
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 0 18px rgba(212, 175, 55, 0.1);
    }
    .cascadeurs-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #0A0A0A;
    }
    .cascadeurs-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0) 40%, rgba(10,10,10,0.88) 90%, rgba(10,10,10,0.96) 100%);
    }
    .cascadeurs-content {
      position: absolute;
      bottom: 14px;
      left: 16px;
      right: 16px;
      z-index: 2;
    }
    .cascadeurs-tag {
      color: var(--gold);
      font-size: 9.5px;
      letter-spacing: 2.5px;
      font-weight: 600;
      margin-bottom: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }
    .cascadeurs-title {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .cascadeurs-sub {
      color: #F0D77A;
      font-family: var(--serif);
      font-size: 12px;
      font-style: italic;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* === LISTE VIDÉOS YOUTUBE === */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
    .video-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--charcoal);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      padding: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .video-card:hover {
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateY(-1px);
    }
    .video-thumb-sm {
      position: relative;
      width: 96px;
      height: 64px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    .play-btn-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }
    .play-btn-sm svg {
      width: 14px;
      height: 14px;
      color: #0A0A0A;
      margin-left: 2px;
    }
    .video-info {
      flex: 1;
      min-width: 0;
    }
    .video-title {
      color: var(--cream);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .video-meta {
      color: var(--smoke);
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    /* === CARROUSEL REELS VERTICAUX === */
    .reels-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 12px 0 4px;
      margin: 0 -16px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .reels-scroll::-webkit-scrollbar { display: none; }
    .reels-scroll { scrollbar-width: none; }
    .reel-card {
      flex: 0 0 auto;
      width: 130px;
      scroll-snap-align: start;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s;
    }
    .reel-card:hover { transform: translateY(-2px); }
    .reel-thumb {
      position: relative;
      width: 130px;
      height: 230px; /* ratio 9:16 */
      background: linear-gradient(135deg, #2a1a1a, #0a0a0a 70%);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .reel-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.6);
    }
    .reel-play svg {
      width: 18px;
      height: 18px;
      color: #0A0A0A;
      margin-left: 3px;
    }
    .reel-platform {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }
    .reel-caption {
      color: var(--cream);
      font-size: 11px;
      font-weight: 500;
      margin-top: 6px;
      text-align: center;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* === RÉSEAUX SOCIAUX === */
    .socials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .social-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(28, 22, 14, 0.6), rgba(15, 12, 8, 0.4));
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .social-card:hover {
      border-color: rgba(212, 175, 55, 0.55);
      transform: translateY(-2px);
    }
    .social-card .social-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .social-card .social-name {
      color: var(--cream);
      font-size: 13px;
      font-weight: 500;
    }
    .social-card.facebook .social-icon { background: #1877F2; color: #FFFFFF; }
    .social-card.instagram .social-icon {
      background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF, #515BD4);
      color: #FFFFFF;
    }
    .social-card.youtube .social-icon { background: #FF0000; color: #FFFFFF; }
    .social-card.website .social-icon { background: var(--gold); color: #0A0A0A; }

    /* === BOUTIQUE === */
    .shop-card {
      position: relative;
      width: 100%;
      height: 170px;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 12px;
      cursor: pointer;
      border: 1px solid rgba(212, 175, 55, 0.35);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 18px rgba(212, 175, 55, 0.12);
      transition: transform 0.2s, border-color 0.2s;
    }
    .shop-card:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.6);
    }
    .shop-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 75% 50%, rgba(212, 175, 55, 0.25), transparent 60%),
        linear-gradient(135deg, #1a0e08 0%, #0a0a0a 50%, #1a0a0a 100%);
    }
    .shop-bg::before {
      content: '🛍️';
      position: absolute;
      font-size: 110px;
      right: -16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.15;
      filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.5));
    }
    .shop-overlay { position: absolute; inset: 0; }
    .shop-content {
      position: absolute;
      inset: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 2;
    }
    .shop-tag {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 2.5px;
      font-weight: 600;
    }
    .shop-title {
      color: var(--cream);
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.15;
      margin-top: 4px;
    }
    .shop-sub {
      color: #F0D77A;
      font-size: 11.5px;
      font-style: italic;
      margin-top: 4px;
      max-width: 70%;
    }
    .shop-cta {
      align-self: flex-start;
      background: var(--gold);
      color: #0A0A0A;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 8px 14px;
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(212, 175, 55, 0.4);
      margin-top: 8px;
    }

    /* === FIN MOI === */

    /* === RECHERCHE DATES === */
    .date-search-wrap {
      margin-bottom: 12px;
    }
    .date-search-label {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 2.5px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .date-search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .date-search-icon {
      position: absolute;
      left: 14px;
      color: var(--gold);
      opacity: 0.7;
      pointer-events: none;
    }
    .date-search-input {
      width: 100%;
      background: var(--charcoal);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 999px;
      padding: 11px 40px 11px 38px;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 14px;
      font-style: italic;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .date-search-input::placeholder {
      color: var(--smoke);
      font-style: italic;
    }
    .date-search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
    }
    .date-search-clear {
      position: absolute;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.2);
      border: none;
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .date-search-clear:hover {
      background: rgba(212, 175, 55, 0.35);
    }
    .date-search-empty {
      margin-top: 12px;
      padding: 14px;
      text-align: center;
      color: var(--smoke);
      font-size: 13px;
      font-style: italic;
      background: rgba(212, 175, 55, 0.05);
      border: 1px dashed rgba(212, 175, 55, 0.25);
      border-radius: 10px;
    }
    .date-item.hidden-by-search {
      display: none;
    }
    .date-month-group.hidden-by-search {
      display: none;
    }

    /* === FAN ZONE — NOUVEAUX MODULES === */
    .contest-featured {
      background: linear-gradient(135deg, rgba(28, 22, 14, 0.8), rgba(40, 25, 10, 0.5));
      border: 1px solid rgba(212, 175, 55, 0.45);
      box-shadow: 0 0 24px rgba(212, 175, 55, 0.12);
    }
    .other-contests {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .mini-contest {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(28, 22, 14, 0.4);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .mini-contest:hover {
      border-color: rgba(212, 175, 55, 0.45);
      transform: translateX(2px);
    }
    .mini-contest-icon {
      font-size: 22px;
      width: 36px;
      height: 36px;

    /* === MODAL LECTEUR VIDÉO === */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .video-modal.active {
      display: flex;
      animation: modalFadeIn 0.25s ease-out;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .video-modal-content {
      width: 100%;
      max-width: 1000px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
    }
    /* Mode reel vertical 9:16 */
    .video-modal-content.vertical {
      width: auto;
      max-width: 100%;
      height: 100%;
      max-height: calc(100vh - 40px);
      aspect-ratio: 9 / 16;
    }
    .video-modal-content iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .video-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.95);
      color: #0A0A0A;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 10000;
      transition: transform 0.2s;
    }
    .video-modal-close:hover {
      transform: scale(1.1);
      background: var(--gold);
    }

    /* Zones de swipe invisibles par-dessus l'iframe — pour capturer le geste avant YouTube */
    /* Pour les REELS (vertical), on utilise haut/bas. Pour les VIDÉOS (horizontal), on utilise gauche/droite */
    .video-modal-content { position: relative; }
    .swipe-zone {
      position: absolute;
      background: transparent;
      z-index: 5;
      cursor: pointer;
    }
    /* Reels (vertical) : zones swipe haut/bas (12% de hauteur chacune) */
    .video-modal-content.vertical .swipe-zone {
      display: block;
    }
    .video-modal-content.vertical .swipe-top {
      top: 0; left: 0; right: 0; height: 18%;
    }
    .video-modal-content.vertical .swipe-bottom {
      bottom: 0; left: 0; right: 0; height: 18%;
    }
    .video-modal-content.vertical .swipe-left,
    .video-modal-content.vertical .swipe-right {
      display: none;
    }
    /* Vidéos (horizontal) : zones swipe gauche/droite (12% de largeur chacune) */
    .video-modal-content:not(.vertical) .swipe-zone {
      display: block;
    }
    .video-modal-content:not(.vertical) .swipe-left {
      top: 0; bottom: 0; left: 0; width: 15%;
    }
    .video-modal-content:not(.vertical) .swipe-right {
      top: 0; bottom: 0; right: 0; width: 15%;
    }
    .video-modal-content:not(.vertical) .swipe-top,
    .video-modal-content:not(.vertical) .swipe-bottom {
      display: none;
    }

    /* Compteur "3 / 8" en bas */
    .video-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--cream);
      font-size: 13px;
      letter-spacing: 1.5px;
      font-family: var(--serif);
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      z-index: 10000;
      backdrop-filter: blur(8px);
    }

    /* Hint "Swipe pour la suivante" — affiché au début, disparaît au 1er swipe */
    .video-swipe-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 16px;
      padding: 16px 24px;
      z-index: 9998;
      pointer-events: none;
      backdrop-filter: blur(10px);
      animation: swipeHintIn 0.4s ease-out, swipeHintFade 4s ease-in-out forwards;
    }
    .video-swipe-hint.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .swipe-hint-icon {
      font-size: 36px;
      color: var(--gold);
      animation: swipeArrow 1.5s ease-in-out infinite;
      line-height: 1;
    }
    .swipe-hint-text {
      font-size: 12px;
      letter-spacing: 1.5px;
      font-family: var(--serif);
      font-style: italic;
      white-space: nowrap;
    }
    @keyframes swipeArrow {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-12px); opacity: 1; }
    }
    @keyframes swipeHintIn {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }
    @keyframes swipeHintFade {
      0%, 60% { opacity: 1; }
      100% { opacity: 0; }
    }

    .stat-row { display: flex; gap: 8px; margin: 14px 0; }
    .stat-box {

    .menu-row {

    /* ================================================
       SPLASH CINÉMATOGRAPHIQUE TWOQ
       Ciel étoilé + nébuleuse + étoile Freddie + logo
       ================================================ */
    .splash {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* Nébuleuse de fond — radial gradient or/bleu */
    .nebula {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(212,175,55,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 70% at 50% 50%, rgba(91,163,245,0.08) 0%, transparent 70%),
        radial-gradient(circle at 75% 25%, rgba(212,175,55,0.10) 0%, transparent 40%),
        #000000;
    }

    /* Petites étoiles scintillantes */
    .star {
      position: absolute;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 4px rgba(255,255,255,0.6);
      animation: twinkle 3s ease-in-out infinite;
      opacity: 0;
    }
    .star.gold { background: var(--gold-pale); box-shadow: 0 0 6px var(--gold); }
    .star.blue { background: #5BA3F5; box-shadow: 0 0 5px rgba(91,163,245,0.8); }

    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Étoile filante (hyperdrive) — part du centre et grossit vers l'utilisateur */
    .hyper-star {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 2px;
      background: var(--gold-pale);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-pale);
      transform-origin: center;
      will-change: transform, opacity;
      opacity: 0;
    }
    /* Chaque étoile a son angle (--angle) et son délai (--delay) injectés en inline-style */
    @keyframes hyperWarp {
      0% {
        opacity: 0;
        transform: rotate(var(--angle, 0deg)) translateX(0) scale(0.5);
        box-shadow: 0 0 2px var(--gold-pale);
      }
      15% {
        opacity: 1;
        box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-pale);
      }
      85% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle, 0deg)) translateX(80vmax) scale(2.5);
        box-shadow: 0 0 14px var(--gold), 0 0 30px var(--gold-pale);
      }
    }
    /* Traînée derrière l'étoile (effet warp) */
    .hyper-star::after {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      height: 1px;
      width: 60px;
      transform: translateY(-50%);
      background: linear-gradient(to left, var(--gold-pale), transparent);
      opacity: 0.85;
      pointer-events: none;
    }

    /* L'ÉTOILE FREDDIE — étoile à 4 rayons en haut à droite */
    .freddie-star {
      position: absolute;
      top: 15%;
      right: 15%;
      width: 110px;
      height: 110px;
      animation: freddieFade 2.5s ease-out 0.4s both;
    }
    @keyframes freddieFade {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    .freddie-halo {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, rgba(212,175,55,0.15) 40%, transparent 70%);
      animation: haloPulse 3s ease-in-out infinite;
    }
    @keyframes haloPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .freddie-rays {
      position: absolute;
      inset: 0;
      animation: raysRotate 18s linear infinite;
    }
    .freddie-rays svg { width: 100%; height: 100%; }
    @keyframes raysRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .freddie-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      margin: -4px 0 0 -4px;
      border-radius: 50%;
      background: var(--cream);
      box-shadow: 0 0 12px var(--gold-pale), 0 0 24px var(--gold);
      animation: corePulse 2s ease-in-out infinite;
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.5); }
    }

    /* Logo TWOQ centré */
    .splash-logo {
      position: absolute;
      top: 42%;

      100% { opacity: 1; transform: translate(-50%, -55%) scale(1); }
    }

    /* Bouton ENTRER */

    .splash-button:active {

      transform: scale(0.97);
    }
    @keyframes buttonPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(212,175,55,0.6); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(212,175,55,0.9); }

    .splash-hint {

      font-size: 11px;

    /* Message de bienvenue doré clignotant */

    /* Tag "Prochaine date" qui clignote pour attirer l'œil */

      // Appel REST direct (pas besoin du SDK) — plus fiable, moins de dépendances

  // Normalise un nom de ville pour l'affichage (NARBONNE → Narbonne)
  function prettifyCity(name) {
    if (!name) return '';
    return name.toLowerCase().replace(/(^|\s|-)([a-zà-ÿ])/g, (m, sep, c) => sep + c.toUpperCase());
  }

  // Nettoie un nom de salle qui contient déjà la ville en doublon
  // Ex: "NARBONNE Arena" + ville "NARBONNE" → "Arena"
  function cleanVenueName(venue, city) {
    if (!venue) return '';
    if (!city) return venue;
    const re = new RegExp('^' + city.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+', 'i');
    return venue.replace(re, '').trim() || venue;
  }

  // Format date FR : "19 septembre 2026"
  function formatDateFR(isoDate) {
    if (!isoDate) return '';
    const d = new Date(isoDate + 'T00:00:00');
    const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  // Format heure FR : "20:30:00" → "20h30"
  function formatHourFR(time) {
    if (!time) return '';
    const m = String(time).match(/^(\d{1,2}):(\d{2})/);
    if (!m) return '';
    return `${m[1]}h${m[2]}`;
  }

  // Récupère le meilleur lien billetterie (priorité : principal > Ticketmaster > Oh My Prod > Fnac > Salle > PMR)
  function bestTicketLink(date) {
    if (date.lien_billetterie_principal) return date.lien_billetterie_principal;
    if (date.liens_billetterie && typeof date.liens_billetterie === 'object') {
      const priority = ['ticketmaster', 'ohmyprod', 'oh_my_prod', 'fnac', 'salle', 'pmr'];
      for (const key of priority) {
        for (const k of Object.keys(date.liens_billetterie)) {
          if (k.toLowerCase().includes(key) && date.liens_billetterie[k]) {
            return date.liens_billetterie[k];
          }
        }
      }
    }
    return null;
  }

  // === FILTRE RECHERCHE DATES ===
  function filterDates(query) {
    const q = (query || '').trim().toLowerCase();
    const clearBtn = document.getElementById('dateSearchClear');
    const emptyMsg = document.getElementById('dateSearchEmpty');
    const items = document.querySelectorAll('.date-item');
    const groups = document.querySelectorAll('.date-month-group');

    if (clearBtn) clearBtn.style.display = q ? 'flex' : 'none';

    if (!q) {
      // Reset : tout afficher
      items.forEach(it => it.classList.remove('hidden-by-search'));
      groups.forEach(g => g.classList.remove('hidden-by-search'));
      if (emptyMsg) emptyMsg.style.display = 'none';
      return;
    }

    let visibleCount = 0;
    items.forEach(it => {
      const city = it.dataset.city || '';
      const venue = it.dataset.venue || '';
      if (city.includes(q) || venue.includes(q)) {
        it.classList.remove('hidden-by-search');
        visibleCount++;
      } else {
        it.classList.add('hidden-by-search');
      }
    });

    // Cache les groupes mois qui n'ont plus aucun élément visible
    groups.forEach(g => {
      let next = g.nextElementSibling;
      let hasVisible = false;
      while (next && !next.classList.contains('date-month-group')) {
        if (next.classList.contains('date-item') && !next.classList.contains('hidden-by-search')) {
          hasVisible = true;
          break;
        }
        next = next.nextElementSibling;
      }
      g.classList.toggle('hidden-by-search', !hasVisible);
    });

    if (emptyMsg) emptyMsg.style.display = visibleCount === 0 ? 'block' : 'none';
  }

    if (input) {

  // URLs Cloudinary : miniature (carrée 400px) et grande (1200px) — Cloudinary transforme automatiquement
  function thumbUrl(id) {
    return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/c_fill,w_400,h_400,q_auto,f_auto/${encodeURIComponent(id)}`;
  }
  function fullUrl(id) {
    return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/w_1600,q_auto,f_auto/${encodeURIComponent(id)}`;
  }

  function buildGallery() {
    const grid = document.getElementById('galleryGrid');
    if (!grid) return;
    grid.innerHTML = GALLERY_PHOTOS.map((id, i) => `
      <div class="gallery-item" onclick="openLightbox(${i})">
        <img src="${thumbUrl(id)}" alt="Photo ${i+1}" loading="lazy" onload="this.classList.add('loaded')">
      </div>
    `).join('');
  }

  // === LIGHTBOX avec swipe + autoplay ===
  let lightboxIndex = 0;
  let lightboxAutoplay = false;
  let lightboxTimer = null;

  function openLightbox(index) {
    lightboxIndex = index;
    const lb = document.getElementById('lightbox');
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
    showLightboxImage();
    // Reset le hint swipe
    const hint = document.getElementById('lightboxSwipeHint');
    if (hint) {
      hint.classList.remove('hidden');
      hint.style.animation = 'none';
      void hint.offsetWidth;
      hint.style.animation = '';
    }
  }
  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('active');
    document.body.style.overflow = '';
    stopLightboxAutoplay();
  }
  function showLightboxImage() {
    const img = document.getElementById('lightboxImg');
    const counter = document.getElementById('lightboxCounter');
    img.src = fullUrl(GALLERY_PHOTOS[lightboxIndex]);
    counter.textContent = `${lightboxIndex + 1} / ${GALLERY_PHOTOS.length}`;
  }
  function lightboxPrev() {
    lightboxIndex = (lightboxIndex - 1 + GALLERY_PHOTOS.length) % GALLERY_PHOTOS.length;
    showLightboxImage();
  }
  function lightboxNext() {
    lightboxIndex = (lightboxIndex + 1) % GALLERY_PHOTOS.length;
    showLightboxImage();
  }
  function toggleLightboxAutoplay() {
    if (lightboxAutoplay) stopLightboxAutoplay();
    else startLightboxAutoplay();
  }
  function startLightboxAutoplay() {
    lightboxAutoplay = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = 'block';
    lightboxTimer = setInterval(lightboxNext, 3500);
  }
  function stopLightboxAutoplay() {
    lightboxAutoplay = false;
    if (lightboxTimer) clearInterval(lightboxTimer);
    lightboxTimer = null;
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    if (playIcon) playIcon.style.display = 'block';
    if (pauseIcon) pauseIcon.style.display = 'none';
  }

  // Swipe tactile + touches clavier pour la lightbox
  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    if (!lb || !lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxPrev();
    if (e.key === 'ArrowRight') lightboxNext();
    if (e.key === ' ') { e.preventDefault(); toggleLightboxAutoplay(); }
  });
  let touchStartX = 0;
  let lightboxSwiped = false;
  document.addEventListener('touchstart', (e) => {
    const lb = document.getElementById('lightbox');
    if (lb && lb.classList.contains('active')) {
      touchStartX = e.touches[0].clientX;
      lightboxSwiped = false;
    }
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    const lb = document.getElementById('lightbox');
    if (!lb || !lb.classList.contains('active') || lightboxSwiped) return;
    const diff = e.touches[0].clientX - touchStartX;
    // Déclenche dès 30px (sans attendre touchend)
    if (Math.abs(diff) > 30) {
      lightboxSwiped = true;
      const hint = document.getElementById('lightboxSwipeHint');
      if (hint) hint.classList.add('hidden');
      if (diff > 0) lightboxPrev();
      else lightboxNext();
    }
  }, { passive: true });

  // === LECTEUR VIDÉO YOUTUBE INTÉGRÉ avec SWIPE ===
  // Listes d'IDs pour navigation (ordre = ordre d'affichage dans les pages)
  const REELS_LIST = [
    'yoFYxLacJlc', 'DfbSREMEgio', 'GhSKNMFzlMs', 'jZSqzuP7A5o',
    'tuAwkGunrM0', 'g1wHig3iBOM', 'JhE2YZaTAs4', 'wQEHlQAs_ME'
  ];
  const VIDEOS_LIST = [
    'Q6VOdTNU9mE', 'ipjg7xsZcx8', 'khyyP4NIBQ4', 'OIo40mWmRII',
    'aYgoOJWT6Bg', 'DmWIfaYm2L0', 'B9lPjOJjRuQ'
  ];
  let currentVideoIndex = 0;
  let currentVideoType = 'video';

  // type: 'video' (horizontal 16:9) ou 'reel' (vertical 9:16)
  function openVideo(videoId, type) {
    const list = type === 'reel' ? REELS_LIST : VIDEOS_LIST;
    const idx = list.indexOf(videoId);
    currentVideoIndex = idx >= 0 ? idx : 0;
    currentVideoType = type;
    loadVideoAtIndex();
    const modal = document.getElementById('videoModal');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    // Reset + adapter le hint visuel selon type
    const hint = document.getElementById('videoSwipeHint');
    const hintIcon = document.getElementById('swipeHintIcon');
    const hintText = document.getElementById('swipeHintText');
    if (hint && hintIcon && hintText) {
      hint.classList.remove('hidden');
      // Re-trigger l'animation
      hint.style.animation = 'none';
      void hint.offsetWidth; // force reflow
      hint.style.animation = '';
      if (type === 'reel') {
        hintIcon.textContent = '↑';
        hintText.textContent = 'Swipe pour la suivante';
      } else {
        hintIcon.textContent = '←';
        hintText.textContent = 'Swipe pour naviguer';
      }
    }
  }

  function loadVideoAtIndex() {
    const content = document.getElementById('videoModalContent');
    const iframe = document.getElementById('videoIframe');
    const counter = document.getElementById('videoCounter');
    const list = currentVideoType === 'reel' ? REELS_LIST : VIDEOS_LIST;
    const videoId = list[currentVideoIndex];

    if (currentVideoType === 'reel') {
      content.classList.add('vertical');
    } else {
      content.classList.remove('vertical');
    }
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
    if (counter) counter.textContent = `${currentVideoIndex + 1} / ${list.length}`;
  }

  function videoPrev() {
    const list = currentVideoType === 'reel' ? REELS_LIST : VIDEOS_LIST;
    currentVideoIndex = (currentVideoIndex - 1 + list.length) % list.length;
    loadVideoAtIndex();
  }
  function videoNext() {
    const list = currentVideoType === 'reel' ? REELS_LIST : VIDEOS_LIST;
    currentVideoIndex = (currentVideoIndex + 1) % list.length;
    loadVideoAtIndex();
  }

  function closeVideo() {
    const modal = document.getElementById('videoModal');
    const iframe = document.getElementById('videoIframe');
    modal.classList.remove('active');
    iframe.src = ''; // stoppe la lecture immédiatement
    document.body.style.overflow = '';
  }

  // Swipe tactile : VERTICAL pour reels (TikTok-style), HORIZONTAL pour vidéos
  // Détection sur touchmove pour réactivité maximale (comme Insta/TikTok)
  let videoTouchStartX = 0;
  let videoTouchStartY = 0;
  let videoSwiped = false;
  document.addEventListener('touchstart', (e) => {
    const modal = document.getElementById('videoModal');
    if (modal && modal.classList.contains('active')) {
      videoTouchStartX = e.touches[0].clientX;
      videoTouchStartY = e.touches[0].clientY;
      videoSwiped = false;
    }
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    const modal = document.getElementById('videoModal');
    if (!modal || !modal.classList.contains('active') || videoSwiped) return;
    const diffX = e.touches[0].clientX - videoTouchStartX;
    const diffY = e.touches[0].clientY - videoTouchStartY;
    const threshold = 30;

    if (currentVideoType === 'reel') {
      // REELS : swipe VERTICAL (TikTok-style)
      if (Math.abs(diffY) > threshold && Math.abs(diffY) > Math.abs(diffX)) {
        videoSwiped = true;
        const hint = document.getElementById('videoSwipeHint');
        if (hint) hint.classList.add('hidden');
        if (diffY < 0) videoNext(); // swipe haut → suivante
        else videoPrev();           // swipe bas → précédente
      }
    } else {
      // VIDEOS : swipe HORIZONTAL
      if (Math.abs(diffX) > threshold && Math.abs(diffX) > Math.abs(diffY)) {
        videoSwiped = true;
        const hint = document.getElementById('videoSwipeHint');
        if (hint) hint.classList.add('hidden');
        if (diffX > 0) videoPrev(); // swipe droite → précédente
        else videoNext();           // swipe gauche → suivante
      }
    }
  }, { passive: true });
  document.addEventListener('keydown', (e) => {
    const modal = document.getElementById('videoModal');
    if (!modal || !modal.classList.contains('active')) return;
    if (e.key === 'Escape') closeVideo();
    if (currentVideoType === 'reel') {
      if (e.key === 'ArrowUp') videoNext();
      if (e.key === 'ArrowDown') videoPrev();
    } else {
      if (e.key === 'ArrowLeft') videoPrev();
      if (e.key === 'ArrowRight') videoNext();
    }
  });
</script>

<!-- MODAL LECTEUR VIDÉO -->
<div id="videoModal" class="video-modal" onclick="if(event.target===this) closeVideo()">
  <button class="video-modal-close" onclick="closeVideo()" aria-label="Fermer">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <div class="video-modal-content" id="videoModalContent">
    <iframe id="videoIframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    <!-- Zones de swipe transparentes par-dessus l'iframe (sinon YouTube capture les touches) -->
    <div class="swipe-zone swipe-top" onclick="videoPrev()"></div>
    <div class="swipe-zone swipe-bottom" onclick="videoNext()"></div>
    <div class="swipe-zone swipe-left" onclick="videoPrev()"></div>
    <div class="swipe-zone swipe-right" onclick="videoNext()"></div>
  </div>
  <div class="video-counter" id="videoCounter">1 / 8</div>
  <!-- Hint d'animation au 1er affichage -->
  <div class="video-swipe-hint" id="videoSwipeHint">
    <div class="swipe-hint-icon" id="swipeHintIcon">↑</div>
    <div class="swipe-hint-text" id="swipeHintText">Swipe pour la suivante</div>
  </div>
</div>

<!-- LIGHTBOX GALERIE -->
<div id="lightbox" class="lightbox" onclick="if(event.target===this) closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fermer">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <div class="lightbox-img-wrap">
    <img id="lightboxImg" class="lightbox-img" src="" alt="Photo TWOQ">
  </div>
  <div class="lightbox-controls">
    <button class="lightbox-playpause" onclick="toggleLightboxAutoplay()" aria-label="Lecture/Pause">
      <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </button>
    <div class="lightbox-counter" id="lightboxCounter">1 / 49</div>
  </div>
  <!-- Hint d'animation au 1er affichage -->
  <div class="lightbox-swipe-hint" id="lightboxSwipeHint">
    <div class="swipe-hint-icon">←</div>
    <div class="swipe-hint-text">Swipe pour naviguer</div>
  </div>
</div>
